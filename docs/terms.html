<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Términos y Condiciones — AUREX</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --gold: #C9A84C; --gold-light: #E8C97A; --black: #080808; --text: #d4c9b0; --text-dim: #7a7060; --white: #f5f0e8; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--black); color: var(--text); font-family: 'Montserrat', sans-serif; font-weight: 300; line-height: 1.8; min-height: 100vh; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(1px 1px at 15% 20%, rgba(201,168,76,0.4) 0%, transparent 100%), radial-gradient(1px 1px at 72% 8%, rgba(201,168,76,0.3) 0%, transparent 100%), radial-gradient(1px 1px at 88% 45%, rgba(201,168,76,0.2) 0%, transparent 100%); pointer-events: none; z-index: 0; }
  .container { max-width: 760px; margin: 0 auto; padding: 60px 24px 80px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 56px; padding-bottom: 40px; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 300; letter-spacing: 0.5em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; display: block; }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 6vw, 42px); font-weight: 300; color: var(--white); letter-spacing: 0.05em; line-height: 1.2; margin-bottom: 16px; }
  .separator { width: 60px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 20px auto; }
  .meta { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); }
  section { margin-bottom: 40px; }
  h2 { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--gold-light); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 14px; padding-left: 16px; border-left: 2px solid var(--gold); }
  p { font-size: 13.5px; color: var(--text); margin-bottom: 12px; letter-spacing: 0.02em; }
  ul { list-style: none; padding-left: 0; margin-bottom: 12px; }
  ul li { font-size: 13.5px; color: var(--text); padding: 6px 0 6px 20px; position: relative; }
  ul li::before { content: '◆'; position: absolute; left: 0; color: var(--gold); font-size: 7px; top: 10px; }
  a { color: var(--gold-light); text-decoration: none; border-bottom: 1px solid rgba(201,168,76,0.3); }
  .highlight-box { background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.2); border-radius: 2px; padding: 20px 24px; margin: 20px 0; }
  .highlight-box p { margin-bottom: 0; font-size: 13px; font-style: italic; color: var(--gold-light); }
  footer { text-align: center; padding-top: 40px; border-top: 1px solid rgba(201,168,76,0.15); margin-top: 60px; }
  footer p { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); }
  .gold-text { color: var(--gold); }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="logo">AUREX</span>
    <h1>Términos y Condiciones</h1>
    <div class="separator"></div>
    <p class="meta">Última actualización: Abril 2026</p>
  </header>
  <section
