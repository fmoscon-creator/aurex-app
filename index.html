<script>
const SCREENS = ['portfolio','mercados','ia','alertas','perfil'];
let cur = 'mercados';

function go(name) {
  // Ocultar todas las pantallas
  SCREENS.forEach(s => {
    document.getElementById('screen-'+s).classList.remove('active');
    const ni = document.getElementById('ni-'+s);
    ni.classList.remove('on');
    const svg = ni.querySelector('svg');
    const span = ni.querySelector('span');
    svg.setAttribute('stroke','#8B949E');
    ni.querySelectorAll('ellipse').forEach(e=>e.setAttribute('stroke','#8B949E'));
    ni.querySelectorAll('circle[r="2"]').forEach(e=>e.setAttribute('fill','#8B949E'));
    span.style.color='';
  });
  
  // Mostrar la pantalla seleccionada
  document.getElementById('screen-'+name).classList.add('active');
  const ni = document.getElementById('ni-'+name);
  ni.classList.add('on');
  const svg = ni.querySelector('svg');
  const span = ni.querySelector('span');
  svg.setAttribute('stroke','#D4A017');
  ni.querySelectorAll('ellipse').forEach(e=>e.setAttribute('stroke','#D4A017'));
  ni.querySelectorAll('circle[r="2"]').forEach(e=>e.setAttribute('fill','#D4A017'));
  span.style.color='#D4A017';
  cur = name;
}

// Escuchar mensajes de las pantallas (iframes)
window.addEventListener('message', e => {
  if(e.data && e.data.type === 'nav') go(e.data.screen);
});
</script>
