<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Aurex">
<meta name="theme-color" content="#0D1117">
<title>Aurex</title>
<style>
/* === RESET NICO === */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:#0D1117;font-family:-apple-system,BlinkMacSystemFont,sans-serif;overflow:hidden}

/* === PHONE  NICA DEFINICIN CORRECTA === */

.ia-btn-active-alcista { background:#3FB95040!important;border-color:#3FB950!important;box-shadow:0 0 12px #3FB95040; }
.ia-btn-active-bajista { background:#FF444440!important;border-color:#FF4444!important;box-shadow:0 0 12px #FF444440; }
.ia-btn-active-altaconf { background:#D4A01740!important;border-color:#D4A017!important;box-shadow:0 0 12px #D4A01740; }

.phone{width:100%;height:100%;display:flex;flex-direction:column;background:#0D1117;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}

.screen{display:none;flex-direction:column;width:100%;flex:1;min-height:0;overflow:hidden}
.screen-inner{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;min-height:0}

/* STATUS BAR */
.sbar{padding:12px 20px 5px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.st{color:#E6EDF3;font-size:15px;font-weight:600}
.sr{display:flex;gap:5px;align-items:center}
.sr span{color:#E6EDF3;font-size:11px}

/* HEADER */
.hdr{padding:10px 16px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #21262D;flex-shrink:0}
.hl{display:flex;align-items:center;gap:8px}
.hn{font-size:16px;font-weight:500;letter-spacing:1px;color:#D4A017}
.hp{font-size:13px;color:#8B949E}
.live{display:flex;align-items:center;gap:4px;font-size:9px;color:#3FB950;font-weight:700}
.ldot{width:5px;height:5px;border-radius:50%;background:#3FB950;animation:lp 1.5s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}

/* SUMMARY */
.sumrow{display:flex;gap:5px;padding:7px 11px;border-bottom:1px solid #21262D;align-items:stretch;flex-shrink:0}
.sc{flex:1;background:#161B22;border-radius:8px;padding:6px 8px;border:1px solid #D4A01745;cursor:pointer;transition:all .15s;position:relative}
.sc:hover{border-color:#D4A01760;background:#1A1F26}
.sc.active{border-color:#D4A017;background:#D4A01715}
.sc-edit{flex-shrink:0;width:32px;background:#D4A01725;border-radius:8px;border:1px solid #D4A01780;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;color:#D4A017}
.sc-edit:hover{border-color:#D4A017;background:#D4A01740}
.sl{font-size:7px;color:#8B949E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.sv{font-size:11px;font-weight:600;color:#E6EDF3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc2{font-size:9px;font-weight:600;margin-top:1px}
.up{color:#3FB950}.dn{color:#F85149}.neu{color:#8B949E}

/* TABS */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid #21262D;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 12px;font-size:10px;font-weight:500;color:#8B949E;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation}
.tab.on{color:#D4A017;border-bottom-color:#D4A017}

/* FILTRO PASES */
.pais-row{display:none;gap:5px;padding:6px 11px;overflow-x:auto;border-bottom:1px solid #21262D;scrollbar-width:none;flex-shrink:0}
.pais-row::-webkit-scrollbar{display:none}
.pais-row.show{display:flex}
.pais{flex-shrink:0;padding:3px 9px;border-radius:12px;font-size:10px;font-weight:500;color:#8B949E;border:0.5px solid #21262D;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation}
.pais.on{background:#21262D;color:#E6EDF3;border-color:#8B949E}

/* TIMEFRAME + EDITAR */
.tfrow{display:flex;gap:5px;padding:6px 11px;border-bottom:1px solid #21262D;align-items:center;flex-shrink:0}
.tfs{display:flex;gap:5px;flex:1}
.tf{padding:3px 9px;border-radius:11px;font-size:10px;font-weight:500;color:#8B949E;border:0.5px solid #21262D;cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation}
.tf.on{background:#D4A01720;color:#D4A017;border-color:#D4A017}
.edit-btn{font-size:9px;color:#8B949E;border:0.5px solid #21262D;padding:3px 9px;border-radius:11px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation}
.edit-btn.on{color:#D4A017;border-color:#D4A017;background:#D4A01715}
.tf-time{font-size:9px;color:#555;flex-shrink:0}

/* EDIT MODE BANNER */
.edit-banner{display:none;background:#D4A01715;border-bottom:1px solid #D4A01740;padding:6px 14px;font-size:10px;color:#D4A017;align-items:center;justify-content:space-between;flex-shrink:0}
.edit-banner.show{display:flex}

/* CONTENT  flex:1 para ocupar espacio disponible, sin max-height fijo */
.cnt{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;min-height:0}
.cnt::-webkit-scrollbar{width:2px}
.cnt::-webkit-scrollbar-thumb{background:#21262D}

/* SECTION HDR */
.shdr{padding:6px 13px;background:#080C10;border-bottom:0.5px solid #21262D;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:2}
.shn{font-size:9px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.8px}
.sbg{font-size:9px;padding:2px 6px;border-radius:7px;font-weight:600}

/* FILA ACTIVO */
.ar{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:0.5px solid #13171D;cursor:pointer;transition:all .15s;position:relative;-webkit-tap-highlight-color:rgba(0,0,0,0);touch-action:manipulation}
.ar:hover{filter:brightness(1.15)}
.ar.active{background:#161B22;border-left:2px solid #D4A017}
.ar:last-child{border-bottom:none}

/* DRAG HANDLE */
.drag-handle{display:none;color:#555;font-size:14px;cursor:grab;flex-shrink:0;width:16px;text-align:center}
.edit-mode .drag-handle{display:block}
.drag-over{background:#D4A01710;border:1px dashed #D4A01760}

/* LOGO */
.logo{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;position:relative}
.logo img{width:100%;height:100%;object-fit:cover;border-radius:9px}
.logo-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border-radius:9px}

/* CENTRO */
.ai{flex:1;min-width:0}
.an{font-size:13px;font-weight:500;color:#E6EDF3}
.as{font-size:10px;color:#555;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:155px}
.ameta{display:flex;align-items:center;gap:5px;margin-top:2px}
.vol-tag{font-size:8px;color:#555}
.fut-open{font-size:8px;padding:1px 5px;border-radius:5px;font-weight:700;background:#1A3A2A;color:#3FB950}

/* SPARKLINE */
.spl{width:50px;height:22px;flex-shrink:0}

/* DERECHA */
.ar-r{text-align:right;flex-shrink:0;min-width:74px}
.ap{font-size:13px;font-weight:500;color:#E6EDF3}
.apct{font-size:10px;font-weight:600;margin-top:2px;padding:2px 6px;border-radius:6px;display:inline-block}
.u{background:#1A3A2A;color:#3FB950}
.d{background:#3A1A1A;color:#F85149}

/* PANEL DETALLE */
.detail-panel{display:none;background:#161B22;border-bottom:1px solid #21262D;overflow:hidden}
.detail-panel.open{display:block;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.dp-top{padding:12px 14px 8px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid #21262D}
.dp-left{}
.dp-price{font-size:22px;font-weight:500;color:#E6EDF3}
.dp-chg-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.dp-pill{font-size:11px;font-weight:600;padding:2px 8px;border-radius:7px}
.dp-range{font-size:10px;color:#8B949E}

/* IA PREDICCIN */
.dp-ai{background:#0D1117;border:1px solid #D4A01740;border-radius:10px;padding:10px 12px;margin:0 14px 10px}
.dp-ai-top{display:flex;align-items:center;gap:6px;margin-
