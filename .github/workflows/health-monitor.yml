name: AUREX Backend Health Monitor

# Monitor 24/7 del backend AUREX. Corre en la nube de GitHub (independiente
# de la Mac de Fernando). Cada 5 min hace ping al backend Railway. Si NO
# responde HTTP 200, manda alerta a Telegram (chat admin Fernando).
#
# Requiere 1 secret configurado en el repo:
#   TELEGRAM_BOT_TOKEN  (copiar de Railway -> Variables -> TELEGRAM_BOT_TOKEN)
# El chat admin esta hardcodeado (no es sensible): 1749518554

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # permite correr manual desde GitHub UI (para test)

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend AUREX
        id: ping
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://aurex-app-production.up.railway.app/" || echo "000")
          echo "http_code=$CODE" >> "$GITHUB_OUTPUT"
          echo "Backend AUREX respondio: HTTP $CODE"

      - name: Alertar a Telegram si el backend cayo
        if: steps.ping.outputs.http_code != '200'
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: '1749518554'
        run: |
          MSG="🚨 AUREX BACKEND CAIDO%0A%0AEl backend respondio HTTP ${{ steps.ping.outputs.http_code }} (esperado 200).%0AURL: aurex-app-production.up.railway.app%0A%0ARevisar Railway dashboard. Alertas, plan y futuros pueden estar afectados.%0A%0A(Monitor automatico GitHub Actions)"
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${MSG}" \
            -d "parse_mode=HTML" || echo "fallo envio telegram"
          echo "Alerta de caida enviada a Telegram"

      - name: Confirmar recuperacion (opcional log)
        if: steps.ping.outputs.http_code == '200'
        run: echo "Backend OK - sin alerta necesaria"
