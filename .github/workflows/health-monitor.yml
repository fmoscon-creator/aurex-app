name: AUREX Backend Health Monitor
on:
  schedule:
      - cron: '*/5 * * * *'
        workflow_dispatch:
        jobs:
          health-check:
              runs-on: ubuntu-latest
                  steps:
                        - name: Ping backend AUREX
                                id: ping
                                        run: |
                                                  CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://aurex-app-production.up.railway.app/" || echo "000")
                                                            echo "http_code=$CODE" >> "$GITHUB_OUTPUT"

                                                                  - name: Alertar a Telegram si el backend cayo
                                                                          if: steps.ping.outputs.http_code != '200'
                                                                                  env:
                                                                                            TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                                                                                                      HTTP_CODE: ${{ steps.ping.outputs.http_code }}
                                                                                                              run: |
                                                                                                                        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                                                                                                                                    -d "chat_id=1749518554" \
                                                                                                                                                --data-urlencode "text=AUREX BACKEND CAIDO - HTTP ${HTTP_CODE}. Revisar Railway."
                                                                                                                                                
                                                                                                                                                      - name: Mensaje de PRUEBA solo disparo manual
                                                                                                                                                              if: github.event_name == 'workflow_dispatch'
                                                                                                                                                                      env:
                                                                                                                                                                                TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
                                                                                                                                                                                        run: |
                                                                                                                                                                                                  curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
                                                                                                                                                                                                              -d "chat_id=1749518554" \
                                                                                                                                                                                                                          --data-urlencode "text=AUREX Monitor - PRUEBA OK. El monitor funciona. Si el backend cae, te llega alerta automatica."
