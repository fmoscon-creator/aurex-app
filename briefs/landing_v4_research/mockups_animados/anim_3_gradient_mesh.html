<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIM 3 — Gradient Mesh Dorado AUREX (estilo Stripe)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#f5f0e8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow-x:hidden; }
.hero { position:relative; min-height:100vh; display:flex; align-items:center; overflow:hidden; }
#mesh { position:absolute; inset:0; z-index:0; width:100%; height:100%; }
.overlay { position:absolute; inset:0; z-index:1; background:radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 100%); pointer-events:none; }
.wrap { position:relative; z-index:2; max-width:1240px; margin:0 auto; padding:0 24px; width:100%; }
.eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#d4af37; font-weight:700; margin-bottom:18px; }
h1 { font-size:clamp(38px,6vw,72px); font-weight:300; line-height:1.05; letter-spacing:-0.03em; max-width:780px; }
h1 b { color:#d4af37; font-weight:500; }
.sub { font-size:18px; color:rgba(245,240,232,0.8); margin-top:24px; max-width:560px; line-height:1.6; }
.badge { position:fixed; top:16px; right:16px; background:#d4af37; color:#000; padding:8px 16px; border-radius:6px; font-size:12px; font-weight:800; z-index:100; }
</style>
</head>
<body>
<div class="badge">ANIM 3 · Gradient Mesh</div>
<section class="hero">
  <canvas id="mesh"></canvas>
  <div class="overlay"></div>
  <div class="wrap">
    <div class="eyebrow">Terminal global en vivo</div>
    <h1>La terminal global de <b>los mercados</b>.</h1>
    <p class="sub">Señales IA sobre 350 activos, alertas push y por Telegram, en 8 idiomas. Datos en tiempo real de 7 mercados globales.</p>
  </div>
</section>

<script>
// Gradient mesh animado dorado (estilo Stripe, canvas 2D, sin librerias)
const canvas = document.getElementById('mesh');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// Blobs de color que se mueven (dorado + ambar + verde sutil)
const blobs = [
  { x:0.2, y:0.3, r:0.5, color:[212,175,55],  vx:0.00018, vy:0.00012, phase:0 },
  { x:0.8, y:0.6, r:0.55, color:[180,140,40], vx:-0.00014, vy:0.0002, phase:2 },
  { x:0.5, y:0.5, r:0.4, color:[212,175,55],  vx:0.0001, vy:-0.00016, phase:4 },
  { x:0.7, y:0.2, r:0.35, color:[45,166,113], vx:-0.0002, vy:0.0001, phase:1 }
];

let t = 0;
function draw(){
  t += 1;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation = 'lighter';
  blobs.forEach(b => {
    const cx = (b.x + Math.sin(t*b.vx*60 + b.phase)*0.15) * W;
    const cy = (b.y + Math.cos(t*b.vy*60 + b.phase)*0.15) * H;
    const rad = b.r * Math.min(W,H);
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad);
    const [r,gn,bl] = b.color;
    g.addColorStop(0, `rgba(${r},${gn},${bl},0.22)`);
    g.addColorStop(0.5, `rgba(${r},${gn},${bl},0.08)`);
    g.addColorStop(1, `rgba(${r},${gn},${bl},0)`);
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, rad, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalCompositeOperation = 'source-over';
  // Grain sutil
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
