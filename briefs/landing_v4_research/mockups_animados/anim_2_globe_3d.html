<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANIM 2 — Globe 3D AUREX (estilo Stripe)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#f5f0e8; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow-x:hidden; }
.sec { position:relative; min-height:100vh; display:grid; grid-template-columns:1fr 1fr; align-items:center; max-width:1240px; margin:0 auto; padding:0 24px; }
@media(max-width:900px){ .sec{ grid-template-columns:1fr; text-align:center; } }
.copy { position:relative; z-index:2; }
.eyebrow { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:#d4af37; font-weight:700; margin-bottom:16px; }
.copy h2 { font-size:clamp(30px,4vw,52px); font-weight:300; line-height:1.1; letter-spacing:-0.02em; margin-bottom:18px; }
.copy h2 b { color:#d4af37; font-weight:500; }
.copy p { font-size:16px; color:rgba(245,240,232,0.7); line-height:1.6; max-width:420px; }
@media(max-width:900px){ .copy p{ margin:0 auto; } }
#globe-wrap { position:relative; height:100vh; }
@media(max-width:900px){ #globe-wrap{ height:60vh; } }
canvas { display:block; }
.badge { position:fixed; top:16px; right:16px; background:#d4af37; color:#000; padding:8px 16px; border-radius:6px; font-size:12px; font-weight:800; z-index:100; }
</style>
</head>
<body>
<div class="badge">ANIM 2 · Globe 3D</div>
<section class="sec">
  <div class="copy">
    <div class="eyebrow">7 mercados · 11 exchanges · 24/7</div>
    <h2>Acceso a los mercados <b>sin fronteras</b>.</h2>
    <p>350 activos de USA, Argentina, Brasil, Europa, Japón y China. Cripto 24/7. Todo en una sola terminal global.</p>
  </div>
  <div id="globe-wrap"></div>
</section>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
}}
</script>
<script type="module">
import * as THREE from 'three';

const wrap = document.getElementById('globe-wrap');
const W = wrap.clientWidth, H = wrap.clientHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
camera.position.set(0, 0, 13);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
wrap.appendChild(renderer.domElement);

const globe = new THREE.Group();
scene.add(globe);

// Esfera base wireframe sutil
const sphereGeo = new THREE.SphereGeometry(4, 40, 40);
const sphereMat = new THREE.MeshBasicMaterial({ color:0x1a1206, wireframe:true, transparent:true, opacity:0.25 });
globe.add(new THREE.Mesh(sphereGeo, sphereMat));

// Esfera sólida oscura interior
const coreMat = new THREE.MeshPhongMaterial({ color:0x080604, emissive:0x110a02, shininess:10 });
globe.add(new THREE.Mesh(new THREE.SphereGeometry(3.95, 40, 40), coreMat));

// Puntos dorados (ciudades) distribuidos en la esfera
function latLngToVec3(lat, lng, r){
  const phi = (90-lat)*Math.PI/180, theta = (lng+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta), r*Math.cos(phi), r*Math.sin(phi)*Math.sin(theta));
}
const cities = [
  [40.7,-74],[34,-118],[-34.6,-58.4],[-23.5,-46.6],[51.5,-0.1],[48.8,2.3],[35.7,139.7],[31.2,121.5],[1.35,103.8],[19.4,-99],[55.7,37.6],[-33.9,151.2],[25,55],[28.6,77.2]
];
const pts = [];
cities.forEach(([lat,lng]) => {
  const v = latLngToVec3(lat,lng,4);
  const dot = new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8), new THREE.MeshBasicMaterial({ color:0xffcc44 }));
  dot.position.copy(v);
  globe.add(dot);
  pts.push(v);
});

// Arcos dorados conectando ciudades
function arc(a, b){
  const mid = a.clone().add(b).multiplyScalar(0.5);
  mid.normalize().multiplyScalar(4 + a.distanceTo(b)*0.4);
  const curve = new THREE.QuadraticBezierCurve3(a, mid, b);
  const geo = new THREE.TubeGeometry(curve, 30, 0.018, 6, false);
  const mat = new THREE.MeshBasicMaterial({ color:0xd4af37, transparent:true, opacity:0.55 });
  return new THREE.Mesh(geo, mat);
}
for(let i=0;i<10;i++){
  const a = pts[Math.floor(Math.random()*pts.length)];
  const b = pts[Math.floor(Math.random()*pts.length)];
  if(a!==b) globe.add(arc(a,b));
}

// Luz
scene.add(new THREE.AmbientLight(0x442200, 0.8));
const p = new THREE.PointLight(0xffcc44, 1.5, 50); p.position.set(8,6,10); scene.add(p);

globe.rotation.x = 0.3;
function animate(){
  requestAnimationFrame(animate);
  globe.rotation.y += 0.003;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  camera.aspect = w/h; camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});
</script>
</body>
</html>
